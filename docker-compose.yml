version: '3.8'

services:
  gateway:
    image: nginx:alpine
    container_name: api_gateway
    ports:
      - "80:80"   # HTTP
      - "443:443" # HTTPS (для деплоя с SSL)
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - register
      - profile

  register:
    image: market-register-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=register_db,1433;Database=${DB_NAME_REGISTER};User Id=sa;Password=${SA_PASSWORD_REGISTER};TrustServerCertificate=True
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
    build:
      context: .
      dockerfile: register/Dockerfile
    depends_on:
      - register_db

  register_db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD_REGISTER}
    ports:
      - "${DB_PORT_REGISTER}:1433"
    volumes:
      - mssql_register_data:/var/opt/mssql
  #==========================================================
  # 2 User Microservice
  #==========================================================
  profile:
    image: market-profile-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=profile_db,1433;Database=${DB_NAME_PROFILE};User Id=sa;Password=${SA_PASSWORD_PROFILE};TrustServerCertificate=True
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
    build:
      context: .
      dockerfile: User/Dockerfile
    depends_on:
      - profile_db

  profile_db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD_PROFILE}
    ports:
      - "${DB_PORT_PROFILE}:1433"
    volumes:
      - mssql_profile_data:/var/opt/mssql
  #==========================================================
  # 3 Product
  #==========================================================
  product:
    image: market-product-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=product_db,1433;Database=${DB_NAME_PRODUCT};User Id=sa;Password=${SA_PASSWORD_PRODUCT};TrustServerCertificate=True
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
    build:
      context: .
      dockerfile: Product/Dockerfile
    depends_on:
      - product_db

  product_db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD_PRODUCT}
    ports:
      - "${DB_PORT_PRODUCT}:1433"
    volumes:
      - mssql_product_data:/var/opt/mssql

volumes:
  mssql_register_data:
  mssql_profile_data:
  mssql_product_data: